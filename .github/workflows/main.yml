name: NewsWala Daily Digest

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/family-news-agent-system-M44ZN

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r api/newswala_requirements.txt

      - name: Run NewsWala
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
        run: python newswala_daily.py
