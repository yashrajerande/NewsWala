name: Auto-merge Claude PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto-merge
        run: gh pr merge --squash "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
